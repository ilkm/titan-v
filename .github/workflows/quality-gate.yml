name: quality-gate

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  rust-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run quality gate
        run: ./tools/quality_gate.sh
